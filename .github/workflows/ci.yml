# PR pipeline. Runs on GitHub-hosted runners (Docker available) — no VPS needed,
# so this gates PRs immediately. Failing any job blocks merge.
name: CI

on:
  pull_request:
  push:
    branches: ["sprint-*"] # feature branches get checks before the PR exists

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore BarBrain.slnx
      - run: dotnet build BarBrain.slnx -c Release --no-restore
      # Testcontainers spins up Postgres+pgvector on the runner's Docker, so the
      # integration tests (incl. migrate-from-empty) run for real here.
      - run: dotnet test BarBrain.slnx -c Release --no-build --logger "trx;LogFileName=test.trx" --results-directory TestResults
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  contrast:
    name: Contrast (WCAG tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      # Fast, no Docker: enforces WCAG contrast against design-tokens.css,
      # including text-on-surface pairs (BRAND.md).
      - run: dotnet test tests/BarBrain.Api.Tests/BarBrain.Api.Tests.csproj -c Release --filter "Category=Contrast"

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Sprint 6 icon pipeline — DORMANT until the SVG masters land
      # (HUMAN-CHECKLIST 14): with no docs/brand/mark.svg it logs and no-ops,
      # so placeholder icons ship unchanged.
      - name: Generate PWA icons from SVG masters (dormant until assets land)
        run: |
          if [ -f docs/brand/mark.svg ]; then
            npm install --no-save sharp
            node infra/generate-icons.mjs
          else
            echo "SVG masters not in repo yet (HUMAN-CHECKLIST 14) — keeping placeholder icons."
          fi

      - name: Start the stack
        run: |
          cp infra/.env.example infra/.env
          # Mock Google/Apple so the OAuth+DOB e2e specs can run (Sprint 2).
          sed -i 's/^AUTH_ENABLE_MOCK_EXTERNAL=false/AUTH_ENABLE_MOCK_EXTERNAL=true/' infra/.env
          docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "API healthy"; exit 0
            fi
            sleep 3
          done
          echo "::error::API never became healthy"
          docker compose -f infra/docker-compose.yml logs
          exit 1

      - name: Seed catalog (bundled seeds + national catalogs + merge-queue demo fixtures)
        run: |
          docker compose -f infra/docker-compose.yml exec -T api dotnet BarBrain.Api.dll import bundled
          # National catalogs need the styles that `bundled` just imported; the
          # files ship in the image at /app/seed/ (csproj Content copy), and
          # exec runs in WORKDIR /app so the relative paths resolve.
          docker compose -f infra/docker-compose.yml exec -T api dotnet BarBrain.Api.dll import products --file seed/whiskey-national.json
          docker compose -f infra/docker-compose.yml exec -T api dotnet BarBrain.Api.dll import products --file seed/beer-national.json
          docker compose -f infra/docker-compose.yml exec -T api dotnet BarBrain.Api.dll import demo-dupes

      - name: Run Playwright
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:5000
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run e2e

      # Sprint 6 acceptance: Lighthouse PWA >= 90, artifact in CI. Pinned to
      # Lighthouse 11 deliberately — v12 removed the PWA category outright;
      # 11.x carries the installability/SW/manifest audits this gate needs.
      - name: Lighthouse PWA audit
        run: |
          npx --yes lighthouse@11.7.1 http://localhost:5000 \
            --only-categories=pwa \
            --chrome-flags="--headless --no-sandbox" \
            --output=json --output=html \
            --output-path=./lighthouse
          SCORE=$(jq '.categories.pwa.score' lighthouse.report.json)
          echo "Lighthouse PWA score: $SCORE"
          jq -e '.categories.pwa.score >= 0.9' lighthouse.report.json > /dev/null \
            || { echo "::error::Lighthouse PWA score $SCORE is below 0.9"; exit 1; }

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            lighthouse.report.html
            lighthouse.report.json

      - name: Seed verification report (Sprint 1 acceptance artifact)
        if: always()
        run: |
          docker compose -f infra/docker-compose.yml exec -T api \
            dotnet BarBrain.Api.dll report --out /tmp/seed-report.md
          docker compose -f infra/docker-compose.yml cp api:/tmp/seed-report.md seed-report.md

      - name: Upload seed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-report
          path: seed-report.md

      - name: Upload screenshots + report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/

      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
