# Sprint 7 hardening: dependency audit + secrets scan.
# "Clean or waived with notes" (spec): a finding fails the job; if a waiver is
# ever needed, record it in docs/SECURITY-WAIVERS.md and adjust the step that
# flagged it in the same PR — never silently.
name: Security

on:
  pull_request:
  push:
    branches: ["main", "sprint-*"]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday sweep — new CVEs land without code changes

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore BarBrain.slnx
      - name: dotnet list package --vulnerable (fails on any hit)
        run: |
          dotnet list BarBrain.slnx package --vulnerable --include-transitive | tee audit.txt
          if grep -q "has the following vulnerable packages" audit.txt; then
            echo "::error::Vulnerable NuGet packages found — update or record a waiver in docs/SECURITY-WAIVERS.md"
            exit 1
          fi

  npm-audit:
    name: npm audit (e2e toolchain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --package-lock-only --no-audit --no-fund
      - name: npm audit --audit-level=high
        run: npm audit --audit-level=high

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — a secret committed and reverted still leaked
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
