# BarBrain — local development stack (ADR-003: Docker everywhere, no IIS).
#   web  → http://localhost:5000   (Blazor WASM via Caddy; proxies /api,/health)
#   api  → reachable at http://localhost:5000/health and (loopback) :8080
#   db   → Postgres 16 + pgvector, bound to loopback only
#
# Usage (from repo root):  docker compose -f infra/docker-compose.yml up --build
# Copy infra/.env.example to infra/.env first to set secrets.
name: barbrain

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: barbrain
      POSTGRES_USER: barbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barbrain}
    ports:
      # Loopback only — for local tooling (psql, dotnet ef). NEVER exposed in
      # prod (Hard Rule 8). The prod overlay drops this mapping entirely.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbrain -d barbrain"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: src/api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=barbrain;Username=barbrain;Password=${POSTGRES_PASSWORD:-barbrain}"
      Admin__Token: ${ADMIN_TOKEN:-}
      GIT_SHA: ${GIT_SHA:-local}
      # Mock Google/Apple for e2e ONLY (CI flips this). The API refuses to
      # boot with it in the Production environment.
      Auth__EnableMockExternal: ${AUTH_ENABLE_MOCK_EXTERNAL:-false}
      # Real OAuth / Turnstile creds (HUMAN-CHECKLIST; empty = feature gated off).
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Auth__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Auth__Apple__ClientId: ${APPLE_CLIENT_ID:-}
      Auth__Apple__TeamId: ${APPLE_TEAM_ID:-}
      Auth__Apple__KeyId: ${APPLE_KEY_ID:-}
      Auth__Apple__PrivateKey: ${APPLE_PRIVATE_KEY:-}
      Turnstile__SiteKey: ${TURNSTILE_SITE_KEY:-}
      Turnstile__SecretKey: ${TURNSTILE_SECRET_KEY:-}
      # Transactional email via SMTP (HUMAN-CHECKLIST 6). Empty SMTP_HOST =
      # every email path logs instead of sending (the dev/CI default).
      Email__Smtp__Host: ${SMTP_HOST:-}
      Email__Smtp__Port: ${SMTP_PORT:-465}
      Email__Smtp__Username: ${SMTP_USERNAME:-}
      Email__Smtp__Password: ${SMTP_PASSWORD:-}
      Email__From: ${EMAIL_FROM:-}
    ports:
      # Loopback only, for direct API testing during dev. Prod reaches the API
      # solely through Caddy; the overlay removes this mapping.
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: src/web/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - api

  # Nightly encrypted pg_dump, 30-day retention (Sprint 7; RUNBOOK topology).
  # Same image as postgres so pg_dump versions can never skew. `once` mode:
  #   docker compose -f infra/docker-compose.yml run --rm backup /backup.sh once
  backup:
    image: pgvector/pgvector:pg16
    entrypoint: ["/bin/bash", "/backup.sh"]
    environment:
      PGHOST: postgres
      PGUSER: barbrain
      PGPASSWORD: ${POSTGRES_PASSWORD:-barbrain}
      PGDATABASE: barbrain
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:-dev-only-not-a-secret}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_HOUR_UTC: ${BACKUP_HOUR_UTC:-3}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-}
    volumes:
      - ./backup.sh:/backup.sh:ro
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  backups:
