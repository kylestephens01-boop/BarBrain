# Dependabot (Sprint 7 hardening): the scaffold shipped with an EMPTY
# ecosystem — a silent no-op. Now tracking all three real surfaces, weekly,
# batched into grouped PRs so review stays cheap.
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nuget-all:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"
    groups:
      npm-all:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
